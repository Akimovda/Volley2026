<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Карта регионов России — Volley 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{display:flex;height:100vh}
#map{flex:1;min-width:0}
#panel{
  width:300px;flex-shrink:0;
  background:#161b22;color:#c9d1d9;
  overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:14px;
  border-left:1px solid #30363d;
}
#panel h1{font-size:15px;font-weight:600;color:#f0f6fc;padding-bottom:10px;border-bottom:1px solid #30363d}
.sect-title{font-size:11px;font-weight:600;color:#7d8590;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ctrl-row label{font-size:12px;color:#8b949e;flex:1}
.ctrl-row span{font-size:12px;font-weight:600;color:#c9d1d9;min-width:36px;text-align:right}
input[type=range]{flex:2;accent-color:#388bfd;cursor:pointer}
input[type=color]{width:34px;height:24px;border:1px solid #30363d;border-radius:4px;background:none;cursor:pointer;padding:1px}
#info{
  background:#0d1117;border:1px solid #30363d;border-radius:8px;
  padding:12px;min-height:70px;font-size:13px;
}
.info-name{font-size:14px;font-weight:600;color:#f0f6fc;margin-bottom:4px}
.info-cap{color:#388bfd;margin-bottom:3px}
.info-fd{font-size:11px;color:#7d8590}
.btn-wrap{display:flex;flex-wrap:wrap;gap:6px}
.tbtn{
  background:#21262d;border:1px solid #30363d;color:#8b949e;
  padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;
  transition:all .15s;
}
.tbtn:hover{background:#30363d;color:#c9d1d9}
.tbtn.on{background:#1f4068;border-color:#388bfd;color:#79c0ff}
.legend{display:flex;flex-direction:column;gap:5px}
.leg-row{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;padding:3px 6px;border-radius:5px;transition:background .1s}
.leg-row:hover{background:#21262d}
.leg-row.dim{opacity:.4}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.leg-name{flex:1;color:#c9d1d9}
.leg-cnt{font-size:11px;color:#7d8590}
#loading{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#161b22;border:1px solid #30363d;border-radius:12px;
  padding:24px 32px;color:#c9d1d9;font-size:14px;z-index:9999;text-align:center;
}
#loading progress{display:block;width:100%;margin-top:10px;accent-color:#388bfd}
.leaflet-popup-content-wrapper{background:#161b22!important;border:1px solid #30363d;border-radius:8px!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important}
.leaflet-popup-content{color:#c9d1d9!important;font-size:13px!important;margin:10px 14px!important}
.leaflet-popup-tip{background:#161b22!important}
.leaflet-popup-close-button{color:#7d8590!important}
.pop-name{font-size:15px;font-weight:600;color:#f0f6fc;margin-bottom:6px}
.pop-row{margin:3px 0;font-size:12px}
.pop-row b{color:#79c0ff}
.pop-spec{font-size:13px;color:#ffa657;font-style:italic}
@media(max-width:768px){
  #app{flex-direction:column}
  #panel{width:100%;height:220px;overflow-y:scroll;border-left:none;border-top:1px solid #30363d}
}
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>
  <div id="panel">
    <h1>🏐 Регионы России</h1>

    <div id="info"><span style="color:#555;font-size:12px">Наведите на регион</span></div>

    <div>
      <div class="sect-title">Стиль регионов</div>
      <div class="ctrl-row"><label>Заливка</label><input type="range" id="s-fill" min="5" max="95" value="65"><span id="v-fill">65%</span></div>
      <div class="ctrl-row"><label>Граница</label><input type="range" id="s-bw" min="0" max="4" step=".5" value="1"><span id="v-bw">1px</span></div>
      <div class="ctrl-row"><label>Цвет границы</label><input type="color" id="s-bc" value="#ffffff"><span></span></div>
    </div>

    <div>
      <div class="sect-title">Маркеры городов</div>
      <div class="btn-wrap">
        <button class="tbtn on" id="btn-cap" onclick="toggleMarkers('cap')">Центры регионов</button>
        <button class="tbtn on" id="btn-sp" onclick="toggleMarkers('sp')">Сочи / Сириус / КП</button>
      </div>
    </div>

    <div>
      <div class="sect-title">Федеральные округа</div>
      <div class="legend" id="legend"></div>
    </div>

    <div style="margin-top:auto;padding-top:10px;border-top:1px solid #30363d">
      <div style="font-size:11px;color:#444d56">
        89 субъектов РФ · GeoJSON: Natural Earth / GitHub<br>
        Новые территории отмечены маркерами<br>
        Volley 2026
      </div>
    </div>
  </div>
</div>

<div id="loading">
  <div>⏳ Загрузка карты регионов…</div>
  <progress id="prog" max="100" value="10"></progress>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
