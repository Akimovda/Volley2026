<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Волейбол — карта России</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;font-family:"Segoe UI",system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden;color:#c0d8f0}

/* HEADER */
.header{padding:.35rem 1rem;background:#0d1626;border-bottom:1px solid #1a2840;display:flex;align-items:center;gap:1rem;flex-shrink:0}
.header h1{font-size:.82rem;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:#3a6080}
.header h1 strong{color:#4fa3e0;font-weight:600}
#loading{font-size:.7rem;color:#2a5070;margin-left:auto}

/* CONTROLS */
#panel{background:#0d1626;border-bottom:1px solid #1a2840;padding:5px 12px;flex-shrink:0;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.ctrl{display:flex;align-items:center;gap:5px;font-size:.68rem;color:#4a7090}
.ctrl label{cursor:pointer;white-space:nowrap}
.ctrl input[type=color]{width:24px;height:20px;border:none;border-radius:3px;cursor:pointer;padding:0;background:none;vertical-align:middle}
.ctrl input[type=range]{width:65px;accent-color:#4fa3e0;vertical-align:middle}
.sep{width:1px;height:18px;background:#1a2840}
.grp{font-size:.6rem;color:#1a3550;text-transform:uppercase;letter-spacing:.08em}
.vbadge{font-size:.62rem;color:#2a5070;min-width:22px;display:inline-block}
.rbtn{font-size:.65rem;color:#4fa3e0;background:#0c1826;border:1px solid #1a3550;border-radius:5px;padding:2px 8px;cursor:pointer;transition:.15s}
.rbtn:hover{background:#162840}

/* MAP */
#map{flex:1;min-height:0}
.leaflet-container{background:#0a0e1a}
.leaflet-control-attribution{background:#0d162699!important;color:#1a3050!important;font-size:.55rem!important}
.leaflet-control-attribution a{color:#1a5080!important}
.leaflet-control-zoom a{background:#0d1626!important;color:#4fa3e0!important;border-color:#1a2840!important}

/* TOOLTIP */
.leaflet-tooltip{background:#0e1a2e;border:1px solid #1e3a5a;border-radius:8px;padding:8px 12px;color:#b0d0f0;font-family:"Segoe UI",sans-serif;font-size:.75rem;pointer-events:auto!important;box-shadow:0 4px 20px rgba(0,0,0,.6);max-width:200px}
.leaflet-tooltip-top::before,.leaflet-tooltip-bottom::before,.leaflet-tooltip-left::before,.leaflet-tooltip-right::before{border-top-color:#1e3a5a!important;border-bottom-color:#1e3a5a!important}
.t-name{font-size:.8rem;font-weight:600;color:#d0e8ff;margin-bottom:3px}
.t-pop{font-size:.67rem;color:#3a6080;margin-bottom:6px}
.t-btn{display:flex;align-items:center;gap:4px;font-size:.67rem;color:#4fa3e0;background:#0c1d30;border-radius:5px;padding:3px 8px;text-decoration:none;transition:.15s;justify-content:center}
.t-btn:hover{background:#1a3550;color:#80c8ff}
.reg-name{font-size:.72rem;color:#a0c8e8}
.reg-code{font-size:.58rem;color:#1a4060;margin-top:2px}

/* LEGEND */
#legend{position:absolute;bottom:26px;right:8px;z-index:800;background:#0d162688;border:1px solid #1a2840;border-radius:8px;padding:7px 10px;font-size:.62rem;color:#2a5070;backdrop-filter:blur(4px);pointer-events:none}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.lr:last-child{margin:0}
.ld{width:10px;height:10px;border-radius:50%}
.ls{width:14px;height:9px;border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <h1>Волейбол <strong>на карте России</strong></h1>
  <span id="loading">⏳ Загрузка регионов...</span>
</div>

<div id="panel">
  <span class="grp">Регионы</span>
  <div class="ctrl"><input type="color" id="c-fill" value="#142238"><label for="c-fill">Заливка</label></div>
  <div class="ctrl"><input type="color" id="c-hover" value="#1a4a7a"><label for="c-hover">Наведение</label></div>
  <div class="ctrl"><input type="color" id="c-border" value="#0e1a2a"><label for="c-border">Контур</label></div>
  <div class="ctrl">
    <input type="range" id="s-bw" min="0" max="3" step=".1" value=".6">
    <label>Толщина</label><span class="vbadge" id="v-bw">0.6</span>
  </div>
  <div class="ctrl"><input type="color" id="c-new" value="#0e2418"><label for="c-new">Новые тер.</label></div>
  <div class="ctrl"><input type="range" id="s-fo" min="0" max="1" step=".05" value=".8"><label>Прозрач.</label><span class="vbadge" id="v-fo">0.8</span></div>
  <div class="sep"></div>
  <span class="grp">Маркеры</span>
  <div class="ctrl"><input type="color" id="c-city" value="#2070b0"><label for="c-city">Города</label></div>
  <div class="ctrl"><input type="color" id="c-active" value="#e85020"><label for="c-active">Активные</label></div>
  <div class="ctrl"><input type="range" id="s-rad" min="3" max="16" step=".5" value="7"><label>Размер</label><span class="vbadge" id="v-rad">7</span></div>
  <div class="sep"></div>
  <button class="rbtn" id="btn-reset">↺ Сброс</button>
</div>

<div id="map"></div>

<div id="legend">
  <div class="lr"><div class="ld" style="background:#e85020;box-shadow:0 0 6px #e8502088"></div>Активный город</div>
  <div class="lr"><div class="ld" style="background:#2070b0;opacity:.7"></div>Город-миллионник</div>
  <div class="lr"><div class="ls" style="background:#0e2418;border:1px solid #1a4028"></div>Новые территории</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

// ── STATE ─────────────────────────────────────────────────────────────────
const DEF = {fill:'#142238',hover:'#1a4a7a',border:'#0e1a2a',bw:.6,newTer:'#0e2418',fo:.8,city:'#2070b0',active:'#e85020',rad:7};
let S = {...DEF};

// ── MAP INIT ──────────────────────────────────────────────────────────────
const map = L.map('map',{center:[64,90],zoom:3,zoomControl:true,minZoom:2,maxZoom:9});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:'abcd',maxZoom:19,opacity:.55
}).addTo(map);

// ── NEW TERRITORIES (precise approximate coords) ─────────────────────────
const NEW_TER_GEO = [
{code:'RU-CR',name:'Республика Крым',coords:[[32.49,46.11],[32.76,46.19],[33.54,46.26],[34.25,46.09],[34.70,46.02],[35.25,46.06],[35.68,45.89],[36.26,45.60],[36.68,45.44],[36.65,45.20],[36.38,45.05],[35.90,44.86],[35.41,45.00],[34.98,44.74],[34.57,44.69],[33.96,44.48],[33.62,44.39],[33.27,44.46],[33.05,44.57],[32.49,44.85],[32.10,45.39],[32.36,45.68],[32.49,46.11]]},
{code:'RU-SEV',name:'Севастополь',coords:[[33.35,44.80],[33.62,44.78],[33.80,44.62],[33.72,44.41],[33.39,44.37],[33.14,44.46],[33.20,44.64],[33.35,44.80]]},
{code:'RU-DON',name:'Донецкая НР',coords:[[37.12,48.43],[37.55,48.76],[37.98,48.70],[38.35,48.64],[38.72,48.52],[39.20,48.22],[39.15,47.87],[38.93,47.55],[38.50,47.30],[38.10,47.25],[37.45,47.37],[36.80,47.63],[37.05,48.08],[37.12,48.43]]},
{code:'RU-LUG',name:'Луганская НР',coords:[[38.36,48.65],[38.70,49.20],[39.25,49.35],[39.98,49.22],[40.48,48.82],[40.25,48.48],[39.95,48.10],[39.28,47.90],[38.75,47.55],[38.35,47.88],[38.12,48.25],[38.36,48.65]]},
{code:'RU-ZP',name:'Запорожская область',coords:[[34.62,47.52],[35.18,47.82],[35.87,47.93],[36.48,47.78],[37.05,47.63],[36.82,47.12],[36.32,46.82],[35.72,46.55],[35.08,46.46],[34.62,46.82],[34.62,47.52]]},
{code:'RU-HR',name:'Херсонская область',coords:[[32.49,46.11],[33.54,46.26],[34.25,46.09],[34.62,46.82],[35.08,46.46],[34.72,46.05],[34.35,45.85],[33.55,45.40],[32.75,45.52],[32.25,45.90],[32.49,46.11]]}
];
const NEW_CODES = new Set(NEW_TER_GEO.map(t=>t.code));

// ── CITIES ────────────────────────────────────────────────────────────────
const CITIES = [
{n:'Москва',         p:'12.5 млн',lat:55.750,lng:37.618, id:403,  hot:true},
{n:'Санкт-Петербург',p:'5.4 млн', lat:59.950,lng:30.320, id:0,    hot:false},
{n:'Новосибирск',    p:'1.6 млн', lat:54.990,lng:82.900, id:782,  hot:true},
{n:'Екатеринбург',   p:'1.5 млн', lat:56.840,lng:60.600, id:0,    hot:false},
{n:'Казань',         p:'1.3 млн', lat:55.800,lng:49.100, id:0,    hot:false},
{n:'Нижний Новгород',p:'1.2 млн', lat:56.330,lng:44.000, id:0,    hot:false},
{n:'Челябинск',      p:'1.16 млн',lat:55.160,lng:61.400, id:0,    hot:false},
{n:'Самара',         p:'1.15 млн',lat:53.195,lng:50.150, id:0,    hot:false},
{n:'Уфа',            p:'1.12 млн',lat:54.735,lng:55.960, id:0,    hot:false},
{n:'Ростов-на-Дону', p:'1.14 млн',lat:47.235,lng:39.720, id:0,    hot:false},
{n:'Омск',           p:'1.12 млн',lat:54.990,lng:73.370, id:0,    hot:false},
{n:'Красноярск',     p:'1.1 млн', lat:56.010,lng:92.852, id:0,    hot:false},
{n:'Воронеж',        p:'1.04 млн',lat:51.668,lng:39.183, id:0,    hot:false},
{n:'Пермь',          p:'1.04 млн',lat:58.000,lng:56.230, id:0,    hot:false},
{n:'Волгоград',      p:'1.01 млн',lat:48.708,lng:44.513, id:0,    hot:false},
{n:'Краснодар',      p:'1.0 млн', lat:45.040,lng:38.970, id:0,    hot:false},
];

// ── GEO LAYER ─────────────────────────────────────────────────────────────
let geoLayer = null;
let allFeatures = [];

function styleFeat(f, hover=false) {
  const isNew = NEW_CODES.has(f.properties.code);
  return {
    fillColor: hover ? S.hover : (isNew ? S.newTer : S.fill),
    fillOpacity: S.fo,
    color: S.border,
    weight: S.bw
  };
}

function buildGeoLayer() {
  if (geoLayer) geoLayer.remove();
  geoLayer = L.geoJSON({type:'FeatureCollection',features:allFeatures}, {
    style: f => styleFeat(f),
    onEachFeature: (f, layer) => {
      const name = f.properties.name_ru || f.properties.name || f.properties.code;
      const code = f.properties.code || f.properties.adm1_code || '';
      layer.on({
        mouseover(e) {
          layer.setStyle(styleFeat(f, true));
          layer.bindTooltip(`<div class="reg-name">${name}</div><div class="reg-code">${code}</div>`,{sticky:true,opacity:1}).openTooltip(e.latlng);
        },
        mouseout() {
          geoLayer.resetStyle(layer);
          layer.closeTooltip();
        }
      });
    }
  }).addTo(map);
}

// ── LOAD GEOJSON ──────────────────────────────────────────────────────────
// Try multiple sources
const SOURCES = [
  'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_1_states_provinces.geojson',
  'https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_50m_admin_1_states_provinces.geojson'
];

async function loadGeo(urls) {
  const loading = document.getElementById('loading');
  for (const url of urls) {
    try {
      loading.textContent = '⏳ Загрузка регионов...';
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      // Filter Russia
      const ruFeats = data.features.filter(f => {
        const p = f.properties;
        return p.iso_a2 === 'RU' || p.adm0_a3 === 'RUS' || p.adm0_iso === 'RUS';
      });
      // Add new territories
      const newFeats = NEW_TER_GEO.map(t => ({
        type:'Feature',
        properties:{code:t.code, name:t.name, name_ru:t.name},
        geometry:{type:'Polygon', coordinates:[t.coords]}
      }));
      allFeatures = [...ruFeats, ...newFeats];
      buildGeoLayer();
      loading.textContent = `✓ ${allFeatures.length} регионов загружено`;
      return;
    } catch(e) {
      console.warn('Source failed:', url, e);
    }
  }
  // Fallback: just new territories
  loading.textContent = '⚠️ Не удалось загрузить регионы РФ';
  const newFeats = NEW_TER_GEO.map(t => ({
    type:'Feature',
    properties:{code:t.code, name:t.name, name_ru:t.name},
    geometry:{type:'Polygon', coordinates:[t.coords]}
  }));
  allFeatures = newFeats;
  buildGeoLayer();
}

loadGeo(SOURCES);

// ── CITY MARKERS ─────────────────────────────────────────────────────────
let cityLayer = L.layerGroup().addTo(map);
let pulseTimers = [];

function buildCities() {
  pulseTimers.forEach(clearInterval);
  pulseTimers = [];
  cityLayer.clearLayers();

  CITIES.forEach(c => {
    const r = S.rad * (c.hot ? 1.5 : 1);
    const col = c.hot ? S.active : S.city;

    // Marker
    const m = L.circleMarker([c.lat,c.lng],{
      radius:r, fillColor:col, fillOpacity:.9,
      color:'#ffffff', weight:c.hot?1.5:.7
    }).addTo(cityLayer);

    // Tooltip
    const tipHtml = `
      <div class="t-name">${c.n}</div>
      <div class="t-pop">${c.p}</div>
      ${c.hot && c.id ? `<a class="t-btn" href="https://volley-bot.store/events?city_id=${c.id}" target="_blank">Смотреть мероприятия →</a>` : ''}`;
    m.bindTooltip(tipHtml,{opacity:1,direction:'top',offset:[0,-r]});

    // Pulse for active cities
    if (c.hot) {
      let pulseLayer = null;
      function doPulse() {
        if (pulseLayer) pulseLayer.remove();
        let rp = r, op = 0.5;
        pulseLayer = L.circleMarker([c.lat,c.lng],{
          radius:rp, fillColor:col, fillOpacity:op,
          color:col, weight:.5, interactive:false
        }).addTo(cityLayer);
        const iv = setInterval(() => {
          rp += .5; op -= .015;
          if (op <= 0) { clearInterval(iv); pulseLayer && pulseLayer.remove(); return; }
          pulseLayer.setStyle({radius:rp, fillOpacity:op, color:col});
        }, 25);
        pulseTimers.push(iv);
      }
      doPulse();
      const si = setInterval(doPulse, 2500);
      pulseTimers.push(si);
    }
  });
}
buildCities();

// ── CONTROLS ─────────────────────────────────────────────────────────────
function bind(id, key, isRange, badge, rebuild) {
  const el = document.getElementById(id);
  el.addEventListener('input', e => {
    S[key] = isRange ? parseFloat(e.target.value) : e.target.value;
    if (badge) document.getElementById(badge).textContent = e.target.value;
    rebuild === 'geo' ? buildGeoLayer() : buildCities();
  });
}
bind('c-fill',   'fill',   false, null,   'geo');
bind('c-hover',  'hover',  false, null,   'geo');
bind('c-border', 'border', false, null,   'geo');
bind('s-bw',     'bw',     true,  'v-bw', 'geo');
bind('c-new',    'newTer', false, null,   'geo');
bind('s-fo',     'fo',     true,  'v-fo', 'geo');
bind('c-city',   'city',   false, null,   'city');
bind('c-active', 'active', false, null,   'city');
bind('s-rad',    'rad',    true,  'v-rad','city');

document.getElementById('btn-reset').addEventListener('click', () => {
  S = {...DEF};
  [['c-fill','fill'],['c-hover','hover'],['c-border','border'],['c-new','newTer'],['c-city','city'],['c-active','active']].forEach(([id,k])=>{ document.getElementById(id).value=S[k]; });
  [['s-bw','bw','v-bw'],['s-fo','fo','v-fo'],['s-rad','rad','v-rad']].forEach(([id,k,vid])=>{ document.getElementById(id).value=S[k]; document.getElementById(vid).textContent=S[k]; });
  buildGeoLayer(); buildCities();
});

</script>
</body>
</html>
